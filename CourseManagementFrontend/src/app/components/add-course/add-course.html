<div class="container mt-5">

<div class="card shadow p-4">

<h2>Add Course</h2>

<form (ngSubmit)="saveCourse()">

<div class="mb-3">
<label>Name</label>
<input type="text"
[(ngModel)]="course.name"
name="name"
class="form-control">
</div>

<div class="mb-3">
<label>Duration</label>
<input type="text"
[(ngModel)]="course.duration"
name="duration"
class="form-control">
</div>

<div class="mb-3">
<label>Fee</label>
<input type="number"
[(ngModel)]="course.fee"
name="fee"
class="form-control">
</div>

<button class="btn btn-success">
Save
</button>

</form>

</div>

</div>
