<div class="container mt-5">

  <div class="card shadow p-4">

    <h2>Edit Course</h2>

    <form (ngSubmit)="updateCourse()">

      <div class="mb-3">
        <label>Name</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="course.name"
          name="name">
      </div>

      <div class="mb-3">
        <label>Duration</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="course.duration"
          name="duration">
      </div>

      <div class="mb-3">
        <label>Fee</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="course.fee"
          name="fee">
      </div>

      <button class="btn btn-primary">
        Update Course
      </button>

    </form>

  </div>

</div>
