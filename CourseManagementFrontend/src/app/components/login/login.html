<div class="login-container">
  <div class="login-card">

    <h2>Admin Login</h2>

    <form (ngSubmit)="login()">

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        class="form-control mb-3">

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        class="form-control mb-3">

      <button
        type="submit"
        class="btn btn-primary w-100">
        Login
      </button>

    </form>

  </div>
</div>
